name: publish-actions
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup NodeJS
        uses: actions/setup-node@v1
        with:
          node-version: 18.x
      - name: Install and build
        run: |
          npm install
          npm run build -- --base=/make-your-own-keyboard/
      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Benjamin Legrand" && git config user.email "b.legrand@groupeonepoint.com"
          npm run deploy -- --repo=https://b-legrand:${{ secrets.GITHUB_TOKEN }}@github.com/b-legrand/make-your-own-keyboard.git --message="updates from ${GITHUB_SHA}" --no-history
